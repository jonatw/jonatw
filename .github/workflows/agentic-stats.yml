name: agentic-stats
on:
  schedule:
    - cron: "0 20 * * *"   # 每天 04:00 台北
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Regenerate stats
        env:
          GH_TOKEN: ${{ secrets.STATS_TOKEN }}   # 唯讀 PAT，讀得到 private
        run: node scripts/agentic-stats.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics/agentic-coding.svg metrics/agentic-coding.json
          git diff --staged --quiet || git commit -m "chore: refresh agentic-coding stats"
          git push
